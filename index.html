<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YES BD Luxury Real Estate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to YES BD</h1>
            <p>Your dream luxury home awaits.</p>
            <a href="#portfolio" class="btn">Explore Now</a>
        </div>
    </section>

    <!-- Portfolio Grid -->
    <section id="portfolio" class="portfolio">
        <h2>Our Portfolio</h2>
        <div class="portfolio-grid">
            <div class="portfolio-item">
                <img src="home1.jpg" alt="Luxury Home 1">
                <h3>Luxury Home 1</h3>
            </div>
            <div class="portfolio-item">
                <img src="home2.jpg" alt="Luxury Home 2">
                <h3>Luxury Home 2</h3>
            </div>
            <div class="portfolio-item">
                <img src="home3.jpg" alt="Luxury Home 3">
                <h3>Luxury Home 3</h3>
            </div>
            <div class="portfolio-item">
                <img src="home4.jpg" alt="Luxury Home 4">
                <h3>Luxury Home 4</h3>
            </div>
        </div>
    </section>

    <!-- Architect Consultation Section -->
    <section class="architect-consultation">
        <h2>Architect Consultation</h2>
        <p>Get expert advice from our experienced architects.</p>
        <a href="#contact" class="btn">Schedule a Consultation</a>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 YES BD. All rights reserved.</p>
    </footer>
</body>
</html>
